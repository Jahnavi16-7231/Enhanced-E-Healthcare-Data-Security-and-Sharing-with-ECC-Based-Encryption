<!DOCTYPE html>
<html>
<head>
    <title>SecureCare | Private Key</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow-sm p-4">
        <h4 class="text-danger">Important: Save Your Private Key</h4>
        <p>This key is shown only once. Do not share it.</p>

        <textarea class="form-control" rows="6" readonly>{{ private_key }}</textarea>

        <a href="/" class="btn btn-primary mt-3">Proceed to Login</a>
    </div>
</div>

</body>
</html>
