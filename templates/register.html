<!DOCTYPE html>
<html lang="en">
<head>
    <title>SecureCare | Register</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="card shadow-sm p-4" style="width: 500px;">

        <div class="text-center mb-3">
            <i class="fa-solid fa-user-shield fa-3x text-primary"></i>
            <h4 class="mt-2">Create Account</h4>
            <p class="text-muted">Secure Healthcare Identity</p>
        </div>

        <form method="POST" action="/register">
            <div class="mb-3">
                <label>Name</label>
                <input type="text" name="name" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Email</label>
                <input type="email" name="email" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Password</label>
                <input type="password" name="password" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Role</label>
                <select name="role" class="form-select" required>
                    <option value="patient">Patient</option>
                    <option value="doctor">Doctor</option>
                </select>
            </div>

            <button class="btn btn-primary w-100">Register</button>
        </form>

        <p class="text-center text-muted small mt-3">
            <i class="fa-solid fa-key"></i> ECC cryptographic identity will be generated
        </p>

        <p class="text-center mt-2">
            Already registered? <a href="/">Login</a>
        </p>
    </div>
</div>

</body>
</html>
