<!DOCTYPE html>
<html lang="en">
<head>
    <title>SecureCare | Login</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- Bootstrap & Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="card shadow-sm p-4" style="width: 420px;">
        
        <div class="text-center mb-4">
            <i class="fa-solid fa-shield-heart fa-3x text-primary"></i>
            <h4 class="mt-2">SecureCare</h4>
            <p class="text-muted">Secure Healthcare Access</p>
        </div>

        {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
        {% endif %}

        <form method="POST" action="/login">
            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" required>
            </div>

            <button class="btn btn-primary w-100">Login</button>
        </form>

        <p class="text-center mt-3">
            New user? <a href="/register">Create an account</a>
        </p>

        <p class="text-center text-muted small mt-2">
            <i class="fa-solid fa-lock"></i> Credentials are cryptographically protected
        </p>
    </div>
</div>

</body>
</html>
